{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Confirmed — TIARRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #f0f0f0; color: #1c1c1c; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #fff; border-radius: 2px; padding: 48px 40px; text-align: center; max-width: 480px; width: 100%; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        .title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; letter-spacing: .1em; color: #1a4a3a; margin-bottom: 10px; }
        .sub { font-size: 14px; color: #888; line-height: 1.7; margin-bottom: 24px; }
        .method { font-size: 13px; background: #e8f5e9; color: #388e3c; padding: 6px 14px; border-radius: 2px; display: inline-block; margin-bottom: 28px; }
        .btn { background: #fb641b; color: #fff; border: none; padding: 13px 32px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; border-radius: 2px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 28px; }
        .btn:hover { background: #e85a18; }

        /* MOBILE FIT */
        @media (max-width: 480px) {
            body { justify-content: center; padding: 20px 16px; }
            .box { padding: 32px 20px; border-radius: 4px; }
            .icon { font-size: 38px; margin-bottom: 12px; }
            .title { font-size: 20px; }
            .sub { font-size: 13px; }
            .method { font-size: 12px; }
            .btn { padding: 12px 24px; font-size: 13px; width: 100%; display: block; margin-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">✅</div>
        <div class="title">Order Confirmed!</div>
        <div class="sub">
            Your order for <strong>{{ product.name }}</strong> has been placed successfully.
        </div>
        <div class="method">
            Payment: {% if method == 'cod' %}Cash on Delivery{% else %}Pay Online{% endif %}
        </div>
        <a href="/" class="btn">Continue Shopping</a>
    </div>
</body>
</html>
